services:
  baba:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Full host system visibility for systeminformation
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /sys:/sys:ro
      - /dev:/dev:ro
      - ./config.json:/app/config.json:ro
      - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "/app/baba", "health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  ntfy:
    image: binwiederhier/ntfy
    command:
      - serve
    volumes:
      - /var/cache/ntfy:/var/cache/ntfy
      - /etc/ntfy:/etc/ntfy
    ports:
      - 8085:80
    restart: unless-stopped
