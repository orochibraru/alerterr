services:
  baba:
    image: orochibraru/baba:latest
    restart: unless-stopped
    # Full host system visibility for systeminformation
    privileged: true
    pid: host
    network_mode: host
    volumes:
      - /sys:/sys:ro
      - /dev:/dev:ro
      - ./config.json:/app/config.json:ro
      - baba_tmp:/app/tmp

volumes:
  baba_tmp: {}
